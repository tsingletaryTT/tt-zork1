# LLM Architecture Configuration - Single Model Mode
# Hardware: 4× P300C chips, using Device 0 only
# Updated: 2026-02-19 - Single Llama-3.2-1B on Device 0 for all roles

mode: multi_agent
game: zork1

# Device Allocation (single model for all roles):
#   Device 0: Llama-3.2-1B-Instruct - Port 9000
#   Roles: Translator + Artist + DM + Player (all on one model)
#
# Note: This is more reliable than 4 separate models and still provides
#       good performance with sequential task handling.

endpoints:
  translator:
    url: http://localhost:9000/v1/chat/completions
    model: Llama-3.2-1B-Instruct
    device: 0
    max_tokens: 50
    temperature: 0.1
    prompt_file: prompts/translator/system_v5_magic.txt

  artist:
    url: http://localhost:9000/v1/chat/completions
    model: Llama-3.2-1B-Instruct
    device: 0
    max_tokens: 150
    temperature: 0.5
    prompt_file: prompts/artist/system_v9_magic.txt

  dm:
    url: http://localhost:9000/v1/chat/completions
    model: Llama-3.2-1B-Instruct
    device: 0
    max_tokens: 250
    temperature: 0.8
    prompt_file: prompts/dm/system_v5_magic.txt

  player:
    url: http://localhost:9000/v1/chat/completions
    model: Llama-3.2-1B-Instruct
    device: 0
    max_tokens: 100
    temperature: 0.6
    prompt_file: prompts/player/system_v3_magic.txt
